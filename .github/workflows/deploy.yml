name: Deploy

# Fires only on actual pushes to main. Merge-queue rulesets gate which commits
# reach main, so the SHA here has already passed ci.yml in the merge_group
# context — no need to re-run tests.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release-tag.outputs.released }}
      tag: ${{ steps.release-tag.outputs.tag }}
      version: ${{ steps.release-tag.outputs.version }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve semantic-release tag
        id: release-tag
        run: |
          git fetch --force --tags
          TAG="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -n 1 || true)"

          if [ -z "$TAG" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No semantic-release tag points at this commit; skipping app packaging."
            exit 0
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved release $TAG"

  package-app:
    name: Sign, Notarize, and Package macOS App
    runs-on: macos-15
    needs: [release]
    if: needs.release.outputs.released == 'true'
    environment: apple-signing
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build Release app
        run: |
          cd menubar && make build XCODEBUILD_ARGS="MARKETING_VERSION=${{ needs.release.outputs.version }} CURRENT_PROJECT_VERSION=${{ github.run_number }}"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_CERTIFICATE_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign app with Developer ID
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="menubar/build/Build/Products/Release/SessionSearch.app"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application: .*(${APPLE_TEAM_ID})" | head -1 | sed -E 's/.*"(.+)"/\1/')"

          if [ -z "$IDENTITY" ]; then
            echo "Developer ID Application identity for team $APPLE_TEAM_ID not found" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi

          codesign --force \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$IDENTITY" \
            "$APP"

          codesign --verify --strict --verbose=2 "$APP"

      - name: Notarize and staple app
        timeout-minutes: 45
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          APP="menubar/build/Build/Products/Release/SessionSearch.app"
          ZIP="menubar/build/Build/Products/Release/SessionSearch-${{ needs.release.outputs.tag }}.app.zip"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          SUBMIT_JSON="$RUNNER_TEMP/notary-submit.json"
          INFO_JSON="$RUNNER_TEMP/notary-info.json"
          LOG_JSON="$RUNNER_TEMP/notary-log.json"

          notarytool_args=(
            --key "$API_KEY_PATH"
            --key-id "$APPLE_API_KEY_ID"
            --issuer "$APPLE_API_ISSUER_ID"
          )

          echo "$APPLE_API_KEY_BASE64" | base64 -D > "$API_KEY_PATH"

          ditto -c -k --keepParent "$APP" "$ZIP"

          xcrun notarytool submit "$ZIP" \
            "${notarytool_args[@]}" \
            --output-format json > "$SUBMIT_JSON"

          SUBMISSION_ID="$(plutil -extract id raw -o - "$SUBMIT_JSON")"

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::notarytool did not return a submission id"
            cat "$SUBMIT_JSON"
            exit 1
          fi

          echo "::notice title=Notarization submitted::Submission $SUBMISSION_ID"

          for attempt in $(seq 1 40); do
            xcrun notarytool info "$SUBMISSION_ID" \
              "${notarytool_args[@]}" \
              --output-format json > "$INFO_JSON"

            STATUS="$(plutil -extract status raw -o - "$INFO_JSON")"
            echo "::notice title=Notarization status::Submission $SUBMISSION_ID is $STATUS (attempt $attempt/40)"

            case "$STATUS" in
              Accepted)
                break
                ;;
              Invalid|Rejected)
                echo "::error::Notarization failed with status $STATUS"
                xcrun notarytool log "$SUBMISSION_ID" \
                  "${notarytool_args[@]}" \
                  --output-format json > "$LOG_JSON" || true
                cat "$LOG_JSON"
                exit 1
                ;;
            esac

            sleep 60
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Timed out waiting for notarization submission $SUBMISSION_ID; last status was $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              "${notarytool_args[@]}" \
              --output-format json > "$LOG_JSON" || true
            cat "$LOG_JSON"
            exit 1
          fi

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          spctl --assess --type execute --verbose=4 "$APP"

          rm -f "$ZIP"
          ditto -c -k --keepParent "$APP" "$ZIP"

      - name: Verify packaged app version
        run: |
          set -euo pipefail

          ZIP="menubar/build/Build/Products/Release/SessionSearch-${{ needs.release.outputs.tag }}.app.zip"
          VERIFY_DIR="$RUNNER_TEMP/session-search-release-verify"
          INFO_PLIST="$VERIFY_DIR/SessionSearch.app/Contents/Info.plist"

          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          ditto -x -k "$ZIP" "$VERIFY_DIR"

          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")"
          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"

          if [ "$SHORT_VERSION" != "${{ needs.release.outputs.version }}" ]; then
            echo "::error::Expected CFBundleShortVersionString ${{ needs.release.outputs.version }}, got $SHORT_VERSION"
            exit 1
          fi

          if [ "$BUILD_VERSION" != "${{ github.run_number }}" ]; then
            echo "::error::Expected CFBundleVersion ${{ github.run_number }}, got $BUILD_VERSION"
            exit 1
          fi

          echo "Verified packaged app version $SHORT_VERSION ($BUILD_VERSION)."

      - name: Upload app to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="menubar/build/Build/Products/Release/SessionSearch-${{ needs.release.outputs.tag }}.app.zip"
          gh release upload "${{ needs.release.outputs.tag }}" "$ZIP" --clobber

      - name: Upload packaged app
        uses: actions/upload-artifact@v7
        with:
          name: SessionSearch-${{ needs.release.outputs.tag }}-release-app
          path: menubar/build/Build/Products/Release/SessionSearch-${{ needs.release.outputs.tag }}.app.zip
          retention-days: 30
