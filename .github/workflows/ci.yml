name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: macos-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'menubar/**'
              - '.github/**'

  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 10
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Install swift-format
        run: brew install swift-format
      - name: Lint
        run: swift-format lint --recursive menubar/Sources menubar/Tests

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd menubar && xcodegen generate
      - name: Build (warnings as errors)
        run: |
          cd menubar && xcodebuild build \
            -project SessionSearch.xcodeproj \
            -scheme SessionSearch \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO \
            OTHER_SWIFT_FLAGS='-warnings-as-errors' \
            | xcpretty --color && exit ${PIPESTATUS[0]}

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd menubar && xcodegen generate
      - name: Run tests
        run: |
          cd menubar && xcodebuild test \
            -project SessionSearch.xcodeproj \
            -scheme SessionSearch \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color && exit ${PIPESTATUS[0]}
      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -d menubar/TestResults.xcresult ]; then
            xcrun xcresulttool get test-results summary \
              --path menubar/TestResults.xcresult \
              --compact 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
            echo "_Could not parse test results._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No test results bundle found._" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: menubar/TestResults.xcresult
          retention-days: 14

  app-smoke:
    name: App Smoke
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Run app smoke
        run: cd menubar && make app-smoke
      - name: Upload app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SessionSearch-app
          path: menubar/build/Build/Products/Release/SessionSearch.app
          retention-days: 14

  file-size-check:
    name: File Size Check
    runs-on: macos-latest
    timeout-minutes: 2
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes (max 300 lines)
        run: |
          OVERSIZED=$(find menubar/Sources -name '*.swift' -exec awk 'END { if (NR > 300) print FILENAME ": " NR " lines" }' {} \;)
          if [ -n "$OVERSIZED" ]; then
            echo "Swift files exceeding 300 lines:"
            echo "$OVERSIZED"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    runs-on: macos-latest
    timeout-minutes: 5
    if: always()
    needs:
      - lint
      - build
      - unit-tests
      - app-smoke
      - file-size-check
    steps:
      - name: Check required jobs
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          SMOKE_RESULT: ${{ needs.app-smoke.result }}
          SIZE_RESULT: ${{ needs.file-size-check.result }}
        run: |
          echo "Lint: $LINT_RESULT, Build: $BUILD_RESULT, Tests: $TEST_RESULT, Smoke: $SMOKE_RESULT, Size: $SIZE_RESULT"
          for result in "$LINT_RESULT" "$BUILD_RESULT" "$TEST_RESULT" "$SMOKE_RESULT" "$SIZE_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job reported: $result"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped"
