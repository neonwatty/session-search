name: UI Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '30 14 * * 1'

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ui-smoke:
    name: UI Smoke
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Run UI smoke
        run: cd menubar && make ui-smoke
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: session-search-ui-smoke-log
          path: /tmp/session-search-ui-smoke.log
          if-no-files-found: ignore
          retention-days: 14
