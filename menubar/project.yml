name: SessionSearch
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    CLANG_COVERAGE_MAPPING: NO
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    ENABLE_CODE_COVERAGE: NO
    COMBINE_HIDPI_IMAGES: YES

targets:
  SessionSearch:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: SessionSearch
        CFBundleDisplayName: Session Search
        CFBundleIdentifier: com.neonwatty.SessionSearch
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "Copyright 2026 Jeremy Watt"

  SessionSearchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SessionSearchTests
      - path: Tests/SessionSearchTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: SessionSearch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.SessionSearchTests

schemes:
  SessionSearch:
    build:
      targets:
        SessionSearch: all
    test:
      gatherCoverageData: false
      targets:
        - SessionSearchTests
